<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smiley Buttons</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="header">You have tried <span id="count">0</span> times</h1>
    <img src="sad.png" alt="A sad face" id="smiley">
    <div class="buttondiv">
        <button onclick="wrong()">Press Me!</button>
        <button onclick="wrong()">Me Please!</button>
        <button onclick="changesmiley()">No, Press Me!</button>
        <button onclick="wrong()">No, don't listen to them. Pick Me!</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
