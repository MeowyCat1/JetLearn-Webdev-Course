<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Felix The Cat</title>
</head>
<body style="max-width: 1000px; margin: auto;">
    <h1 class="title">Felix The Cat</h1>
    <img src="felix.jpeg" alt="A silly cat sticking his tounge out">
    <p style="background-color: black; color: white; background-size: cover;">This is my cat, Felix. He is very friendly, but likes to meow very loudly at me</p>
    <ul style="font-family: sans-serif;">
        <li>Meowing</li>
        <li>Eating food</li>
        <li>Cuddling</li>
        <li>Eating yet more food</li>
        <li>Asking for more food</li>
    </ul>
        <div class="card">
            <h1 class="cardhead">Felix</h1>
            <h2 class="cardsub">Age</h2>
            <p class="cardtext">17</p>
            <h2 class="cardsub">IQ</h2>
            <p class="cardtext">-100</p>
            <h2 class="cardsub">Kindness</h2>
            <p class="cardtext">Infinite</p>
        </div>
        <hr>
        <p class="info">Created by Sam Fussey in 2026</p>
    </body>
</html>
